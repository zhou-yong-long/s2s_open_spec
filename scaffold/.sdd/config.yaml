version: "1"
mode: flat
template: default
doctor:
  flat_max: 12
  similarity_threshold: 0.6
paths:
  specs: specs/
  active: specs/active/
  completed: specs/completed/
  archived: specs/archived/
plugins:
  doctor: true
  diff: true
  workflow: true
  board: true
extractors:
  ".ts": typescript
  ".py": python
  ".go": null
